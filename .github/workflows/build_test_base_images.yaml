name: build and push test base images CI

permissions:
  contents: read
  packages: write

on:
  push:
    branches:
      - main
    paths:
      - "docker/test_base/Dockerfile"
      - "docker/test_base/entry_point.sh"
      - ".github/workflows/build_test_base_images.yaml"
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        ubuntu_version:
          - "20.04"
          - "22.04"
          - "24.04"
    steps:
      - name: Checkout commit
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
        with:
          # Use buildkit master for zstd compression support
          driver-opts: image=moby/buildkit:master

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: ./docker/test_base
          file: ./docker/test_base/Dockerfile
          push: true
          tags: ghcr.io/tier4/ota-client/test_base:ubuntu_${{ matrix.ubuntu_version }}
          build-args: |
            UBUNTU_BASE=ubuntu:${{ matrix.ubuntu_version }}
          outputs: type=image,name=ghcr.io/tier4/ota-client/test_base:ubuntu_${{ matrix.ubuntu_version }},compression=zstd,compression-level=19,oci-mediatypes=true,force-compression=true
          cache-from: type=gha
          cache-to: type=gha,mode=max
