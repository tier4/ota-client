name: build and push test base images CI

permissions:
  contents: read
  packages: write

on:
  push:
    branches:
      - main
    paths:
      - "docker/test_base/Dockerfile"
      - "docker/test_base/entry_point.sh"
      - ".github/workflows/build_test_base_images.yaml"
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        ubuntu_version:
          - "20.04"
          - "22.04"
          - "24.04"
    steps:
      - name: Checkout commit
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4
        with:
          # Use buildkit master for zstd compression support
          driver-opts: image=moby/buildkit:master

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: ./docker/test_base
          file: ./docker/test_base/Dockerfile
          push: true
          tags: ghcr.io/tier4/ota-client/test_base:ubuntu_${{ matrix.ubuntu_version }}
          build-args: |
            UBUNTU_BASE=ubuntu:${{ matrix.ubuntu_version }}
          outputs: type=image,name=ghcr.io/tier4/ota-client/test_base:ubuntu_${{ matrix.ubuntu_version }},compression=zstd,compression-level=19,oci-mediatypes=true,force-compression=true
          cache-from: type=gha
          cache-to: type=gha,mode=max
