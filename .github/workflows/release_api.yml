name: Release API(Protocol Buffer) CI

permissions:
  contents: read
  packages: read
  actions: read

on:
  release:
    types: [published]
  # allow manually triggering the build
  workflow_dispatch:

jobs:
  build_python_packages:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: setup python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          # use the minimum py ver we support to generate the wheel
          python-version: 3.8

      - name: install build deps
        run: |
          python -m pip install -U pip
          python -m pip install -U hatch

      - name: build otaclient service API python package
        run: |
          pushd proto
          hatch build -t wheel
          popd
          mkdir -p dist
          cp proto/dist/*.whl dist

      - name: upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: artifacts-python-packages
          path: dist/*.whl

  post_build:
    runs-on: ubuntu-latest
    needs: [build_python_packages]
    permissions:
      contents: write
    steps:
    - name: checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - name: download python packages artifact
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
      with:
        name: artifacts-python-packages
        path: dist

    - name: calculate checksum
      uses: ./.github/actions/calculate_checksum
      with:
        file_patterns: '*.{whl}'
        directory: 'dist'

    - name: publish release artifacts
      if: ${{ github.event_name == 'release' }}
      uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
      with:
        files: |
          dist/*.whl
          dist/*.checksum
